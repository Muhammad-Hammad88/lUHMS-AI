<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LUMHS Chat Widget</title>
</head>
<body>

<style>
  :root {
    --lumhs-navy: #0a1f44;
    --lumhs-gold: #c9a84c;
    --lumhs-gold-light: #e8c96a;
    --lumhs-navy-light: #1a3a6e;
    --lumhs-white: #ffffff;
    --lumhs-gray: #f5f5f5;
    --lumhs-text: #2c2c2c;
    --lumhs-shadow: 0 8px 40px rgba(10, 31, 68, 0.25);
  }

  #lumhs-chat-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, var(--lumhs-navy), var(--lumhs-navy-light));
    border: 2.5px solid var(--lumhs-gold);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: var(--lumhs-shadow);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    z-index: 9999;
    outline: none;
    padding: 0;
    overflow: hidden;
  }

  #lumhs-chat-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 12px 50px rgba(10, 31, 68, 0.35);
  }

  #lumhs-chat-btn .bot-icon {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    display: block;
  }

  #lumhs-chat-btn .close-icon {
    display: none;
    width: 24px;
    height: 24px;
    fill: var(--lumhs-gold);
  }

  #lumhs-chat-btn.open .bot-icon { display: none; }
  #lumhs-chat-btn.open .close-icon { display: block; }

  #lumhs-chat-btn::after {
    content: '';
    position: absolute;
    top: 4px;
    right: 4px;
    width: 12px;
    height: 12px;
    background: var(--lumhs-gold);
    border-radius: 50%;
    border: 2px solid white;
    animation: pulse-dot 2s infinite;
  }

  #lumhs-chat-btn.open::after { display: none; }

  @keyframes pulse-dot {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.3); opacity: 0.7; }
  }

  #lumhs-chat-window {
    position: fixed;
    bottom: 120px;
    right: 28px;
    width: 370px;
    height: 520px;
    background: var(--lumhs-white);
    border-radius: 16px;
    box-shadow: var(--lumhs-shadow);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    z-index: 9998;
    transform: scale(0.85) translateY(20px);
    opacity: 0;
    pointer-events: none;
    transform-origin: bottom right;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.25s ease;
    border: 1px solid rgba(201, 168, 76, 0.3);
  }

  #lumhs-chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1;
    pointer-events: all;
  }

  #lumhs-chat-header {
    background: linear-gradient(135deg, var(--lumhs-navy) 0%, var(--lumhs-navy-light) 100%);
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 2px solid var(--lumhs-gold);
    flex-shrink: 0;
  }

  /* FIXED: Used transforms to counter the empty space at the top of the image file */
  .lumhs-bot-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    border: 2px solid var(--lumhs-gold);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    
    /* These three lines physically shift the visual graphic upward into the true center */
    transform: scale(1.3) translateY(3px);
    transform-origin: center center;
    background: transparent;
  }

  .lumhs-header-text h3 {
    margin: 0;
    color: var(--lumhs-white);
    font-size: 14px;
    font-family: Georgia, serif;
    font-weight: bold;
  }

  .lumhs-header-text p {
    margin: 2px 0 0;
    color: var(--lumhs-gold-light);
    font-size: 11px;
    font-family: Arial, sans-serif;
  }

  .lumhs-status-dot {
    width: 8px;
    height: 8px;
    background: #4caf50;
    border-radius: 50%;
    display: inline-block;
    margin-right: 5px;
    animation: blink 2s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  #lumhs-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    background: #fafaf8;
  }

  #lumhs-messages::-webkit-scrollbar { width: 4px; }
  #lumhs-messages::-webkit-scrollbar-track { background: transparent; }
  #lumhs-messages::-webkit-scrollbar-thumb {
    background: rgba(10, 31, 68, 0.2);
    border-radius: 4px;
  }

  .lumhs-msg {
    max-width: 85%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 13.5px;
    line-height: 1.5;
    font-family: Arial, sans-serif;
    animation: msg-in 0.3s ease;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .lumhs-msg.bot {
    background: var(--lumhs-white);
    color: var(--lumhs-text);
    border-radius: 4px 14px 14px 14px;
    align-self: flex-start;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-left: 3px solid var(--lumhs-gold);
  }

  .lumhs-msg.user {
    background: linear-gradient(135deg, var(--lumhs-navy), var(--lumhs-navy-light));
    color: var(--lumhs-white);
    border-radius: 14px 4px 14px 14px;
    align-self: flex-end;
    box-shadow: 0 2px 8px rgba(10, 31, 68, 0.2);
  }

  .lumhs-typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 12px 14px;
    background: var(--lumhs-white);
    border-radius: 4px 14px 14px 14px;
    align-self: flex-start;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    border-left: 3px solid var(--lumhs-gold);
    animation: msg-in 0.3s ease;
  }

  .lumhs-typing span {
    width: 7px;
    height: 7px;
    background: var(--lumhs-navy);
    border-radius: 50%;
    animation: typing-bounce 1.2s infinite;
  }

  .lumhs-typing span:nth-child(2) { animation-delay: 0.2s; }
  .lumhs-typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typing-bounce {
    0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-6px); opacity: 1; }
  }

  .lumhs-suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .lumhs-suggestion-btn {
    background: transparent;
    border: 1px solid var(--lumhs-gold);
    color: var(--lumhs-navy);
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11.5px;
    cursor: pointer;
    font-family: Arial, sans-serif;
    transition: all 0.2s;
  }

  .lumhs-suggestion-btn:hover {
    background: var(--lumhs-gold);
    color: var(--lumhs-navy);
  }

  #lumhs-input-area {
    padding: 12px 14px;
    background: var(--lumhs-white);
    border-top: 1px solid rgba(201, 168, 76, 0.2);
    display: flex;
    gap: 8px;
    align-items: flex-end;
    flex-shrink: 0;
  }

  #lumhs-input {
    flex: 1;
    border: 1.5px solid #e0ddd5;
    border-radius: 22px;
    padding: 9px 14px;
    font-size: 13.5px;
    font-family: Arial, sans-serif;
    outline: none;
    resize: none;
    max-height: 80px;
    line-height: 1.4;
    color: var(--lumhs-text);
    background: var(--lumhs-gray);
    transition: border-color 0.2s;
  }

  #lumhs-input:focus {
    border-color: var(--lumhs-gold);
    background: white;
  }

  #lumhs-input::placeholder { color: #aaa; }

  #lumhs-send-btn {
    width: 38px;
    height: 38px;
    background: linear-gradient(135deg, var(--lumhs-navy), var(--lumhs-navy-light));
    border: none;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.2s, background 0.2s;
    box-shadow: 0 2px 8px rgba(10,31,68,0.2);
  }

  #lumhs-send-btn:hover {
    transform: scale(1.1);
    background: var(--lumhs-gold);
  }

  #lumhs-send-btn svg { width: 16px; height: 16px; fill: white; }
  #lumhs-send-btn:hover svg { fill: var(--lumhs-navy); }

  .lumhs-powered {
    text-align: center;
    font-size: 10px;
    color: #aaa;
    padding: 4px 0 8px;
    font-family: Arial, sans-serif;
  }

  @media (max-width: 420px) {
    #lumhs-chat-window {
      width: calc(100vw - 20px);
      right: 10px;
      bottom: 100px;
      height: 70vh;
    }
    #lumhs-chat-btn { right: 16px; bottom: 16px; }
  }
</style>

<button id="lumhs-chat-btn" onclick="lumhsToggleChat()" aria-label="Open LUMHS Chat">
  <img class="bot-icon" src="bot-logo.png" alt="LUMHS Bot"/>
  <svg class="close-icon" viewBox="0 0 24 24">
    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
  </svg>
</button>

<div id="lumhs-chat-window">
  <div id="lumhs-chat-header">
    <img class="lumhs-bot-avatar" src="bot-logo.png" alt="LUMHS Bot"/>
    <div class="lumhs-header-text">
      <h3>LUMHS Assistant</h3>
      <p><span class="lumhs-status-dot"></span>Online — Ask me anything</p>
    </div>
  </div>

  <div id="lumhs-messages">
    <div class="lumhs-msg bot">
      Welcome to <strong>LUMHS</strong>! I'm your university assistant. How can I help you today?
      <div class="lumhs-suggestions">
        <button class="lumhs-suggestion-btn" onclick="lumhsAsk('What faculties are in LUMHS?')">Faculties</button>
        <button class="lumhs-suggestion-btn" onclick="lumhsAsk('How to apply for admission?')">Admissions</button>
        <button class="lumhs-suggestion-btn" onclick="lumhsAsk('What programs are offered?')">Programs</button>
        <button class="lumhs-suggestion-btn" onclick="lumhsAsk('Contact information')">Contact</button>
      </div>
    </div>
  </div>

  <div id="lumhs-input-area">
    <textarea id="lumhs-input" placeholder="Type your question..." rows="1"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();lumhsSend();}"></textarea>
    <button id="lumhs-send-btn" onclick="lumhsSend()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <div class="lumhs-powered">Powered by LUMHS AI</div>
</div>

<script>
  const LUMHS_API = 'http://127.0.0.1:5000/ask';
  let SESSION_ID = '';
  console.log('Session ID at start:', SESSION_ID);

  function lumhsToggleChat() {
    document.getElementById('lumhs-chat-btn').classList.toggle('open');
    document.getElementById('lumhs-chat-window').classList.toggle('open');
    if (document.getElementById('lumhs-chat-window').classList.contains('open')) {
      document.getElementById('lumhs-input').focus();
    }
  }

  function lumhsAsk(question) {
    document.getElementById('lumhs-input').value = question;
    lumhsSend();
  }

  async function lumhsSend() {
    const input = document.getElementById('lumhs-input');
    const question = input.value.trim();
    if (!question) return;
    input.value = '';
    input.style.height = 'auto';
    lumhsAddMessage(question, 'user');
    const typing = lumhsShowTyping();
    try {
      const response = await fetch(LUMHS_API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, session_id: SESSION_ID })
      });
      const data = await response.json();
      typing.remove();
      if (data.session_id) SESSION_ID = data.session_id;
      console.log('Session ID updated:', SESSION_ID);
      lumhsAddMessage(data.answer, 'bot');
    } catch (e) {
      typing.remove();
      lumhsAddMessage('Sorry, unable to connect to the server. Please try again.', 'bot');
    }
  }

  function lumhsAddMessage(text, type) {
    const messages = document.getElementById('lumhs-messages');
    const msg = document.createElement('div');
    msg.className = `lumhs-msg ${type}`;
    if (type === 'bot') {
  let formatted = text
  .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
  .replace(/\*(.*?)\*/g, '<em>$1</em>')
  .replace(/\n/g, '<br>')
  .replace(/(\d+\.\s)/g, '<br><strong>$1</strong>')
  .replace(/^<br>/, '');
      msg.innerHTML = formatted;
    } else {
      msg.textContent = text;
    }
    messages.appendChild(msg);
    messages.scrollTop = messages.scrollHeight;
  }

  function lumhsShowTyping() {
    const messages = document.getElementById('lumhs-messages');
    const t = document.createElement('div');
    t.className = 'lumhs-typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    messages.appendChild(t);
    messages.scrollTop = messages.scrollHeight;
    return t;
  }

  document.getElementById('lumhs-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  });
</script>
</body>
</html>
